<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Intelligent Algorithms">
  <!-- node-graph monogram: interlinked I and A -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="4.2">
    <line x1="30" y1="18" x2="30" y2="82" stroke="#1d4ed8"/>                  <!-- I stem -->
    <line x1="30" y1="50" x2="48" y2="50" stroke="#38bdd8" stroke-width="3.6"/> <!-- interlink -->
    <line x1="62" y1="16" x2="34" y2="84" stroke="#0e9ab7"/>                  <!-- A left leg -->
    <line x1="62" y1="16" x2="86" y2="84" stroke="#0e9ab7"/>                  <!-- A right leg -->
    <line x1="48" y1="50" x2="74" y2="50" stroke="#0891b2"/>                  <!-- A crossbar -->
  </g>
  <g>
    <circle cx="30" cy="18" r="5"   fill="#1d4ed8"/>
    <circle cx="30" cy="50" r="5"   fill="#1d4ed8"/>
    <circle cx="30" cy="82" r="5"   fill="#1d4ed8"/>
    <circle cx="62" cy="16" r="5"   fill="#0d9488"/>
    <circle cx="34" cy="84" r="5"   fill="#0e9ab7"/>
    <circle cx="86" cy="84" r="5"   fill="#0e9ab7"/>
    <circle cx="48" cy="50" r="4.4" fill="#0891b2"/>
    <circle cx="74" cy="50" r="4.4" fill="#0891b2"/>
  </g>
</svg>
