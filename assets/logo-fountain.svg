<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Intelligent Algorithms">
  <!-- bright node-graph monogram: interlinked I and A (for the dark hero) -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="4.6">
    <line x1="30" y1="18" x2="30" y2="82" stroke="#5aa2f5"/>                  <!-- I stem -->
    <line x1="30" y1="50" x2="48" y2="50" stroke="#8fd9ff" stroke-width="3.9"/> <!-- interlink -->
    <line x1="62" y1="16" x2="34" y2="84" stroke="#4cd4ec"/>                  <!-- A left leg -->
    <line x1="62" y1="16" x2="86" y2="84" stroke="#4cd4ec"/>                  <!-- A right leg -->
    <line x1="48" y1="50" x2="74" y2="50" stroke="#2fe0c4"/>                  <!-- A crossbar -->
  </g>
  <g fill="#f2fbff" stroke="#bfeaff" stroke-width="0.9">
    <circle cx="30" cy="18" r="5.2"/>
    <circle cx="30" cy="50" r="5.2"/>
    <circle cx="30" cy="82" r="5.2"/>
    <circle cx="62" cy="16" r="5.2"/>
    <circle cx="34" cy="84" r="5.2"/>
    <circle cx="86" cy="84" r="5.2"/>
    <circle cx="48" cy="50" r="4.6"/>
    <circle cx="74" cy="50" r="4.6"/>
  </g>
</svg>
